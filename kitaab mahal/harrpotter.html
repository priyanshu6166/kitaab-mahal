<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Reader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        /* Navbar styles */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: linear-gradient(90deg, rgb(77, 161, 169), rgb(121, 215, 190));
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .navbar:hover {
            transform: translateY(-2px);
        }

        .navbar-brand {
            font-size: 1.8em;
            font-weight: bold;
            color: #fff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .navbar-brand:hover {
            color: #f4f4f9;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
        }

        .menu-toggle span {
            width: 30px;
            height: 4px;
            background-color: #fff;
            border-radius: 5px;
            transition: transform 0.3s ease;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                gap: 15px;
                position: absolute;
                top: 70px;
                right: 20px;
                background-color: rgba(77, 161, 169, 0.95);
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            }

            .nav-links.active {
                display: flex;
            }

            .menu-toggle {
                display: flex;
            }
        }

        /* Body and container adjustments */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: rgb(246, 244, 240);
            color: rgb(46, 80, 119);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding-top: 80px; /* Add padding to avoid navbar overlap */
            overflow-y: scroll;
        }

        .container1 {
            max-width: 1200px;
            width: 100%;
            padding: 40px;
            background-color: rgb(246, 244, 240);
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }

        .header {
            background-color: rgb(46, 80, 119);
            padding: 20px;
            border-radius: 15px;
            color: rgb(246, 244, 240);
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            color: rgb(121, 215, 190);
        }

        .header p {
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .pdf-container {
            margin-top: 40px;
            position: relative;
            width: 100%;
            height: 70vh;  /* Adjusted height for responsiveness */
            background-color: rgb(246, 244, 240);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            overflow: auto;
        }

        .pdf-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer {
            text-align: center;
            padding: 10px;
            background-color: rgb(46, 80, 119);
            color: rgb(121, 215, 190);
            border-radius: 15px;
            margin-top: 20px;
        }

        .footer p {
            margin: 0;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <section>
        <nav class="navbar">
            <a href="index.html" class="navbar-brand">𝒦𝒾𝓉𝒶𝒶𝒷 𝑀𝒶𝒽𝒶𝓁</a>
            <div class="menu-toggle" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </section>

    <section class="container1">
        <div class="header">
            <h1>HARRY POTTER</h1>
            <p>Author: J.K. ROWLING</p>
        </div>

        <div class="pdf-container">
            <iframe src="data/Harry Potter and the Sorcerers Stone.pdf" type="application/pdf" title="Book PDF"></iframe>

        </div>

        <div class="footer">
            <p>&copy; 2025 Book Reader. All rights reserved.</p>
        </div>
    </section>

    <script>
        function toggleMenu() {
            const navLinks = document.querySelector('.nav-links');
            navLinks.classList.toggle('active');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</body>
</html>
